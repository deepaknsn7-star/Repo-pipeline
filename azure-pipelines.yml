trigger: none

pool:
  name: Demo agent

stages:

# -------------------------
# Stage 1: Init + Plan
# -------------------------
- stage: Plan
  displayName: "Terraform Plan"

  jobs:
    - job: terraformPlan
      displayName: "Run Terraform Plan"

      steps:
        - task: TerraformInstaller@1
          displayName: Install Terraform
          inputs:
            terraformVersion: 'latest'

        - task: TerraformTask@5
          displayName: Terraform Init
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: 'Demo connection'
            backendAzureRmResourceGroupName: 'rg_deepak'
            backendAzureRmStorageAccountName: 'deepakstoragepip'
            backendAzureRmContainerName: 'gitdemo'
            backendAzureRmKey: 'firstdemopipeline'

        - task: TerraformTask@5
          displayName: Terraform Plan
          inputs:
            provider: 'azurerm'
            command: 'plan'
            environmentServiceNameAzureRM: 'Demo connection'
            commandOptions: '-out=tfplan'

        # Publish plan as artifact (important!)
        - publish: tfplan
          artifact: terraformPlan

# -------------------------
# Stage 2: Apply
# -------------------------
- stage: Apply
  displayName: "Terraform Apply"
  dependsOn: Plan

  # Optional safety: only run manually or after approval
  condition: succeeded()

  jobs:
    - job: terraformApply
      displayName: "Run Terraform Apply"

      steps:
        - task: TerraformInstaller@1
          displayName: Install Terraform
          inputs:
            terraformVersion: 'latest'

        - download: current
          artifact: terraformPlan

        - task: TerraformTask@5
          displayName: Terraform Init
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: 'Demo connection'
            backendAzureRmResourceGroupName: 'rg_deepak'
            backendAzureRmStorageAccountName: 'deepakstoragepip'
            backendAzureRmContainerName: 'gitdemo'
            backendAzureRmKey: 'firstdemopipeline'

        - task: TerraformTask@5
          displayName: Terraform Apply
          inputs:
            provider: 'azurerm'
            command: 'apply'
            environmentServiceNameAzureRM: 'Demo connection'
            commandOptions: 'tfplan'

